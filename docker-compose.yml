version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: carteiradb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: carteiradb
      JWT_SECRET: segredo-producao-trocar
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
